name: Build, Push & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: "Skip health check after deploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  SERVER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/playground-server
  CLIENT_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/playground-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      commit_sha: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then
            echo "Missing GitHub secret: DOCKER_HUB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "Missing GitHub secret: DOCKER_HUB_TOKEN"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e

            echo "=============================================="
            echo "Starting deployment at $(date)"
            echo "=============================================="

            COMMIT_SHA="${{ needs.build-and-push.outputs.commit_sha }}"
            DOCKER_HUB_USERNAME="${{ secrets.DOCKER_HUB_USERNAME }}"
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            DATABASE_URL="${{ secrets.DATABASE_URL }}"

            APP_DIR="$HOME/Playground"
            cd "$APP_DIR"

            echo "Working directory: $(pwd)"

            echo "Stopping existing containers..."
            docker compose -f docker-compose.yml down --remove-orphans 2>/dev/null || true
            docker rm -f react_client fastapi_server 2>/dev/null || true

            echo "Cleaning unused Docker data..."
            docker system prune -af --volumes || true
            docker builder prune -af || true
            docker image prune -af || true
            df -h

            : > docker-compose.yml
            echo "services:" >> docker-compose.yml
            echo "  server:" >> docker-compose.yml
            echo "    image: ${DOCKER_HUB_USERNAME}/playground-server:${COMMIT_SHA}" >> docker-compose.yml
            echo "    container_name: fastapi_server" >> docker-compose.yml
            echo "    ports:" >> docker-compose.yml
            echo "      - \"8000:8000\"" >> docker-compose.yml
            echo "    restart: always" >> docker-compose.yml
            echo "    environment:" >> docker-compose.yml
            echo "      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> docker-compose.yml
            echo "      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> docker-compose.yml
            echo "      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}" >> docker-compose.yml
            echo "      - AWS_REGION=${AWS_REGION}" >> docker-compose.yml
            echo "      - DATABASE_URL=${DATABASE_URL}" >> docker-compose.yml
            echo "  client:" >> docker-compose.yml
            echo "    image: ${DOCKER_HUB_USERNAME}/playground-client:${COMMIT_SHA}" >> docker-compose.yml
            echo "    container_name: react_client" >> docker-compose.yml
            echo "    ports:" >> docker-compose.yml
            echo "      - \"5173:5173\"" >> docker-compose.yml
            echo "    restart: always" >> docker-compose.yml

            echo "New docker-compose.yml:"
            cat docker-compose.yml

            echo "Pulling server image..."
            docker pull "${DOCKER_HUB_USERNAME}/playground-server:${COMMIT_SHA}"
            echo "Pulling client image..."
            docker pull "${DOCKER_HUB_USERNAME}/playground-client:${COMMIT_SHA}"

            echo "Starting containers..."
            docker compose -f docker-compose.yml up -d --remove-orphans

            echo "Running containers:"
            docker compose -f docker-compose.yml ps

            echo "Deployment completed at $(date)"

  health-check:
    needs: deploy
    if: ${{ !inputs.skip_health_check }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for services to be ready
        run: sleep 15

      - name: Check server health
        run: |
          echo "Checking server health..."
          for i in {1..5}; do
            echo "Attempt $i/5..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8000/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Server is healthy (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Server not ready (HTTP $HTTP_CODE), retrying in 5s..."
            sleep 5
          done
          echo "Server health check failed after 5 attempts"
          curl -v http://${{ secrets.EC2_HOST }}:8000/
          exit 1

      - name: Check docs endpoint
        run: |
          echo "Checking /docs endpoint..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8000/docs)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "/docs is accessible (HTTP $HTTP_CODE)"
          else
            echo "/docs returned HTTP $HTTP_CODE"
          fi

  rollback:
    needs: [deploy, health-check]
    if: ${{ failure() && needs.health-check.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "Health check failed. Initiating rollback..."

            DOCKER_HUB_USERNAME="${{ secrets.DOCKER_HUB_USERNAME }}"
            APP_DIR="$HOME/Playground"
            cd "$APP_DIR"

            docker compose -f docker-compose.yml down --remove-orphans 2>/dev/null || true
            sed -i 's/:[a-f0-9]\{40\}/:latest/g' docker-compose.yml 2>/dev/null || true

            docker pull "${DOCKER_HUB_USERNAME}/playground-server:latest"
            docker pull "${DOCKER_HUB_USERNAME}/playground-client:latest"
            docker compose -f docker-compose.yml up -d --remove-orphans

            echo "Rollback completed"
