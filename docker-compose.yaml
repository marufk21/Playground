services:
  server:
    build: ./apps/server
    container_name: fastapi_server
    ports:
      - "8000:8000"
    volumes:
      - ./apps/server:/app
    env_file:
      - ./apps/server/.env   
    restart: always

  client:
    build: ./apps/client
    container_name: react_client
    ports:
      - "5173:5173"
    volumes:
      - ./apps/client:/app
      - /app/node_modules
    depends_on:
      - server
    env_file:
      - ./apps/client/.env   
    restart: always